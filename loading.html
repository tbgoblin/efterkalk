<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gantech Efterkalk</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Sora', 'Segoe UI Variable', 'Segoe UI', sans-serif;
            background:
                radial-gradient(circle at 12% 15%, rgba(22, 106, 188, 0.26), transparent 36%),
                radial-gradient(circle at 86% 18%, rgba(79, 139, 220, 0.24), transparent 34%),
                radial-gradient(circle at 76% 86%, rgba(92, 166, 70, 0.20), transparent 30%),
                linear-gradient(155deg, #0c203a 0%, #0f3560 52%, #114f76 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
            user-select: none;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: -20vmax;
            background-image:
                linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
            background-size: 38px 38px;
            transform: rotate(-6deg);
            opacity: 0.18;
            animation: gridDrift 16s linear infinite;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            width: 280px;
            height: 280px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(92,166,70,0.40) 0%, rgba(92,166,70,0) 70%);
            right: -70px;
            bottom: -90px;
            animation: blobPulse 3.8s ease-in-out infinite;
            pointer-events: none;
        }
        .card {
            position: relative;
            background: linear-gradient(170deg, rgba(6, 26, 48, 0.66) 0%, rgba(15, 53, 96, 0.56) 100%);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 22px;
            padding: 34px clamp(20px, 4vw, 54px);
            text-align: left;
            width: min(640px, 92vw);
            box-shadow: 0 30px 70px rgba(0,0,0,0.34);
            backdrop-filter: blur(12px);
            animation: cardFloat 3.2s ease-in-out infinite;
        }
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 22px;
            border: 1px solid rgba(255,255,255,0.08);
            pointer-events: none;
        }
        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.22);
            margin-bottom: 14px;
        }
        .eyebrow-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #5ca646;
            box-shadow: 0 0 0 6px rgba(92,166,70,0.24);
            animation: pulse 1.3s ease-in-out infinite;
        }
        .logo {
            font-size: clamp(24px, 2.8vw, 33px);
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            line-height: 1.12;
        }
        .brand-lockup {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .brand-logo {
            width: clamp(52px, 5vw, 68px);
            height: clamp(52px, 5vw, 68px);
            border-radius: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.24);
            box-shadow: 0 10px 24px rgba(0,0,0,0.30), inset 0 1px 0 rgba(255,255,255,0.12);
            padding: 8px;
            object-fit: contain;
            filter: brightness(0) invert(1) contrast(1.08);
            flex-shrink: 0;
        }
        .brand-text {
            min-width: 0;
        }
        .subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.82);
            margin-bottom: 20px;
            max-width: 560px;
        }
        .progress-bar-bg {
            background: rgba(255,255,255,0.14);
            border-radius: 999px;
            height: 10px;
            width: 100%;
            margin-bottom: 14px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.20);
        }
        .progress-bar {
            background: linear-gradient(90deg, #5ca646 0%, #7fcf6b 38%, #ffffff 100%);
            height: 100%;
            border-radius: 999px;
            width: 10%;
            transition: width 0.45s cubic-bezier(0.22, 0.61, 0.36, 1);
            box-shadow: 0 6px 20px rgba(127,207,107,0.45);
        }
        .status-text {
            font-size: 14px;
            color: rgba(255,255,255,0.92);
            min-height: 20px;
            font-weight: 600;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .pct {
            font-size: 12px;
            font-weight: 700;
            color: rgba(255,255,255,0.75);
            min-width: 40px;
            text-align: right;
        }
        .version {
            margin-top: 16px;
            font-size: 11px;
            color: rgba(255,255,255,0.62);
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        @keyframes cardFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        @keyframes blobPulse {
            0%, 100% { transform: scale(1); opacity: 0.84; }
            50% { transform: scale(1.16); opacity: 0.98; }
        }
        @keyframes gridDrift {
            0% { transform: rotate(-6deg) translateY(0); }
            100% { transform: rotate(-6deg) translateY(-38px); }
        }
        @media (max-width: 640px) {
            .card {
                border-radius: 18px;
                padding: 22px 16px;
            }
            .logo {
                font-size: 24px;
            }
            .brand-lockup {
                gap: 10px;
            }
            .brand-logo {
                width: 50px;
                height: 50px;
                border-radius: 12px;
                padding: 7px;
            }
            .subtitle {
                font-size: 12px;
                margin-bottom: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="eyebrow"><span class="eyebrow-dot"></span>System startup</div>
        <div class="brand-lockup">
            <img class="brand-logo" src="./assets/brand/logo-gantech.png" alt="Gantech logo" />
            <div class="brand-text">
                <div class="logo">Gantech Efterkalk</div>
            </div>
        </div>
        <div class="subtitle">Vi starter motoren op, varmer data-cache og forbereder rapportmotoren med live status.</div>
        <div class="progress-bar-bg">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="status-row">
            <div class="status-text" id="statusText">Starter op...</div>
            <div class="pct" id="statusPct">10%</div>
        </div>
        <div class="version" id="versionText"></div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const port = params.get('port') || '3000';
        const appUrl = 'http://localhost:' + port;

        // Show version
        try {
            const v = params.get('v');
            if (v) document.getElementById('versionText').textContent = 'v' + v;
        } catch(e) {}

        const messages = [
            { pct: 10, text: 'Starter op...' },
            { pct: 25, text: 'Forbinder til database...' },
            { pct: 45, text: 'Indlæser ordreliste...' },
            { pct: 65, text: 'Forberegner marginer...' },
            { pct: 80, text: 'Opvarmer cache...' },
            { pct: 92, text: 'Næsten klar...' },
        ];
        let step = 0;
        const LOADING_MIN_MS = 5000;
        const loadingStartedAt = Date.now();
        let navigationRequested = false;
        const bar = document.getElementById('progressBar');
        const txt = document.getElementById('statusText');
        const pctEl = document.getElementById('statusPct');

        function advance() {
            if (step >= messages.length) return;
            bar.style.width = messages[step].pct + '%';
            txt.textContent = messages[step].text;
            pctEl.textContent = messages[step].pct + '%';
            step++;
        }

        advance();
        const timer = setInterval(() => {
            if (step < messages.length) {
                advance();
            } else {
                clearInterval(timer);
            }
        }, 1400);

        // Phase 1: Poll /health — wait for server
        // Phase 2: Poll /warmup-status — show real startup progress and navigate only when fully ready
        let pollCount = 0;
        let serverReady = false;
        let warmupPollCount = 0;

        function navigateToApp() {
            if (navigationRequested) return;
            navigationRequested = true;
            clearInterval(pollTimer);
            clearInterval(timer);
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('statusText').textContent = 'Klar! Åbner...';
            document.getElementById('statusPct').textContent = '100%';

            const elapsedMs = Date.now() - loadingStartedAt;
            const waitMs = Math.max(0, LOADING_MIN_MS - elapsedMs);
            setTimeout(() => { window.location.href = appUrl; }, waitMs + 300);
        }

        const pollTimer = setInterval(async () => {
            pollCount++;
            try {
                if (!serverReady) {
                    // Phase 1: wait for server
                    const r = await fetch(appUrl + '/health', { cache: 'no-store' });
                    if (r.ok) {
                        serverReady = true;
                        clearInterval(timer);
                        bar.style.width = '30%';
                        txt.textContent = 'Forberegner ordrer...';
                    }
                } else {
                    // Phase 2: show real startup progress (aftercalc + margin prefetch)
                    warmupPollCount++;
                    const r = await fetch(appUrl + '/warmup-status', { cache: 'no-store' });
                    if (r.ok) {
                        const data = await r.json();
                        const combinedDone = Number(data.combinedDone || 0);
                        const combinedTotal = Number(data.combinedTotal || 0);
                        const combinedPct = Number(data.combinedPct || 0);
                        const marginDone = Number(data.marginDone || 0);
                        const marginTotal = Number(data.marginTotal || 0);

                        if (combinedTotal > 0) {
                            const pct = Math.round(30 + (combinedPct / 100) * 65);
                            bar.style.width = Math.min(pct, 95) + '%';
                            pctEl.textContent = Math.min(pct, 95) + '%';
                            txt.textContent = 'Forberegner: ' + combinedDone + '/' + combinedTotal + ' (margin ' + marginDone + '/' + marginTotal + ')';
                        } else {
                            bar.style.width = '35%';
                            pctEl.textContent = '35%';
                            txt.textContent = 'Forbereder ordreliste...';
                        }

                        const warmupFinished = Boolean(data.ready);
                        if (warmupFinished) {
                            navigateToApp();
                        }
                    } else {
                        txt.textContent = 'Venter pa startup-status...';
                    }
                }
            } catch(e) {
                // Not ready — keep polling
            }
            // After 90s in phase 1 — give up
            if (!serverReady && pollCount > 180) {
                clearInterval(pollTimer);
                document.getElementById('statusText').textContent = 'Serveren svarer ikke. Kontakt IT.';
                document.getElementById('statusPct').textContent = '--';
                document.getElementById('progressBar').style.background = 'rgba(255,255,255,0.4)';
            }
        }, 500);

        // Show version if passed via URL param (already handled above)
    </script>
</body>
</html>
